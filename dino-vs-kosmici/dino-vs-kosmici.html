    ctx.fillStyle = '#ffcc33';
    ctx.beginPath(); ctx.arc(0, 0, 7.5, 0, Math.PI*2); ctx.fill();

    // inner engraved ring
    ctx.strokeStyle = '#c89110';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.stroke();

    // highlight blob
    ctx.fillStyle = 'rgba(255, 245, 200, 0.55)';
    ctx.beginPath(); ctx.arc(-2.2, -2.4, 2.6, 0, Math.PI*2); ctx.fill();

    // $ sign
    ctx.fillStyle = '#6a3a00';
    ctx.font = 'bold 10px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 0.5);

    ctx.restore();
  }

  function drawPlayer(p) {
    if (drawDinoSprite(p)) return;
    if (p.species === 'tyranno') return drawTyranno(p);
    if (p.species === 'diplo')   return drawDiplo(p);
    return drawStego(p);
  }

  function drawShield(p) {
    if (!p || p.shield <= 0) return;
    const a = clamp(p.shield / 2.5, 0, 1);
    ctx.save();
    ctx.globalAlpha = 0.25 + a * 0.2;
    ctx.strokeStyle = '#9bd6ff';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(p.x, p.y - 4, p.r + 12 + Math.sin(state.t*8)*2, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  function drawStego(p) {
    ctx.save();
    ctx.translate(p.x, p.y - (p.jump>0 ? Math.sin((0.5-p.jump)*Math.PI)*22 : 0));
    if (p.facing === -1) ctx.scale(-1, 1);
    if (p.flash > 0) ctx.filter = 'brightness(1.6) saturate(0.5)';

    const wp = p.walkPhase || 0;
    const moving = Math.hypot(p.vx, p.vy) > 30;
    const bob = Math.sin(wp * 2) * (moving ? 1.6 : 0.4);
    // tail sway
    const tailSway = Math.sin(wp) * (moving ? 4 : 0.8);
    // alternating leg lifts (only positive halves of sine = swing phase)
    const liftBack  = Math.max(0, Math.sin(wp));
    const liftFront = Math.max(0, Math.sin(wp + Math.PI));
    const liftAmt = moving ? 5 : 0;
    // tiny head bob
    const headBob = Math.sin(wp + 0.6) * (moving ? 1 : 0);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0, 18, 22, 6, 0, 0, Math.PI*2); ctx.fill();

    // legs (4 visible, 2 pairs). Far legs slightly thinner and one tick darker.
    // Back pair
    ctx.fillStyle = '#2f7a2f';
    ctx.fillRect(-12, 11 + bob*0.3 - liftBack*liftAmt, 4, 10 - liftBack*3);
    ctx.fillStyle = '#3f8f3f';
    ctx.fillRect(-15, 10 + bob*0.4 - liftBack*liftAmt, 6, 12 - liftBack*4);
    // Front pair
    ctx.fillStyle = '#2f7a2f';
    ctx.fillRect( 9, 11 + bob*0.3 - liftFront*liftAmt, 4, 10 - liftFront*3);
    ctx.fillStyle = '#3f8f3f';
    ctx.fillRect( 5, 10 + bob*0.4 - liftFront*liftAmt, 6, 12 - liftFront*4);

    // body
    ctx.fillStyle = '#4ea84e';
    ctx.beginPath(); ctx.ellipse(-2, bob, 22, 14, 0, 0, Math.PI*2); ctx.fill();
    // belly
    ctx.fillStyle = '#a3d9a3';
    ctx.beginPath(); ctx.ellipse(-3, 6+bob, 14, 6, 0, 0, Math.PI*2); ctx.fill();

    // tail (animated swing)
    ctx.fillStyle = '#4ea84e';
    ctx.beginPath();
    ctx.moveTo(-18, bob);
    ctx.quadraticCurveTo(-30, -2 + bob + tailSway*0.4, -34, 4 + bob + tailSway);
    ctx.quadraticCurveTo(-30,  8 + bob + tailSway*0.4, -18, 6 + bob);
    ctx.fill();

    // back plates (stegosaurus signature)
    ctx.fillStyle = '#2f7a2f';
    for (let i=-2;i<=2;i++){
      const px = i*7 - 3;
      // tiny per-plate wobble during walk
      const pw = Math.sin(wp + i*0.4) * (moving ? 0.7 : 0);
      ctx.beginPath();
      ctx.moveTo(px-4, -8+bob+pw);
      ctx.lineTo(px,   -18+bob+pw);
      ctx.lineTo(px+4, -8+bob+pw);
      ctx.closePath(); ctx.fill();
    }

    // head
    ctx.fillStyle = '#4ea84e';
    ctx.beginPath(); ctx.ellipse(18, -2+bob+headBob, 11, 9, 0, 0, Math.PI*2); ctx.fill();
    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(22, -4+bob+headBob, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(23, -4+bob+headBob, 1.6, 0, Math.PI*2); ctx.fill();
    // mouth
    ctx.strokeStyle = '#1f4f1f'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(20, 1+bob+headBob); ctx.lineTo(28, 1+bob+headBob); ctx.stroke();

    // attack flash near mouth/claw
    if (p.attackAnim > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.arc(28, 0+bob+headBob, 7*p.attackAnim*4, 0, Math.PI*2); ctx.fill();
    }

    ctx.filter = 'none';
    ctx.restore();
  }

  // ----- Tyranozaur -----
  function drawTyranno(p) {
    ctx.save();
    ctx.translate(p.x, p.y - (p.jump>0 ? Math.sin((0.5-p.jump)*Math.PI)*22 : 0));
    if (p.facing === -1) ctx.scale(-1, 1);
    if (p.flash > 0) ctx.filter = 'brightness(1.6) saturate(0.5)';

    const wp = p.walkPhase || 0;
    const moving = Math.hypot(p.vx, p.vy) > 30;
    const bob = Math.sin(wp*2) * (moving ? 1.8 : 0.4);
    const tailSway = Math.sin(wp) * (moving ? 5 : 0.8);
    const liftBack  = Math.max(0, Math.sin(wp));
    const liftFront = Math.max(0, Math.sin(wp + Math.PI));
    const liftAmt = moving ? 5 : 0;
    const headBob = Math.sin(wp + 0.6) * (moving ? 1.5 : 0);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0, 18, 24, 6, 0, 0, Math.PI*2); ctx.fill();

    // 2 powerful back legs (T-Rex hindlimbs)
    ctx.fillStyle = '#5a2a10';
    // back leg (further)
    ctx.fillRect(-9, 11+bob*0.3 - liftBack*liftAmt, 6, 13 - liftBack*4);
    ctx.fillStyle = '#7a3a20';
    ctx.fillRect(-12, 10+bob*0.4 - liftBack*liftAmt, 8, 14 - liftBack*5);
    // front leg
    ctx.fillStyle = '#5a2a10';
    ctx.fillRect( 6, 11+bob*0.3 - liftFront*liftAmt, 6, 13 - liftFront*4);
    ctx.fillStyle = '#7a3a20';
    ctx.fillRect( 3, 10+bob*0.4 - liftFront*liftAmt, 8, 14 - liftFront*5);
    // claw toes — 3 little claws on each foot when planted
    ctx.fillStyle = '#fff5cc';
    if (liftBack < 0.2) {
      for (let i=0;i<3;i++) ctx.fillRect(-12 + i*3, 22+bob*0.4, 1.5, 2);
    }
    if (liftFront < 0.2) {
      for (let i=0;i<3;i++) ctx.fillRect( 3 + i*3, 22+bob*0.4, 1.5, 2);
    }

    // body (chunky)
    ctx.fillStyle = '#a85a3a';
    ctx.beginPath(); ctx.ellipse(-3, bob, 22, 14, 0, 0, Math.PI*2); ctx.fill();
    // belly
    ctx.fillStyle = '#d49a7a';
    ctx.beginPath(); ctx.ellipse(-3, 6+bob, 14, 6, 0, 0, Math.PI*2); ctx.fill();
    // back stripes (no plates — tyrannosaurs didn't have them)
    ctx.strokeStyle = '#5a2a10'; ctx.lineWidth = 1.4;
    for (let i=0;i<4;i++) {
      const x = -16 + i*8;
      ctx.beginPath();
      ctx.moveTo(x, -8+bob);
      ctx.quadraticCurveTo(x+2, -12+bob, x+1, -14+bob);
      ctx.stroke();
    }

    // thick tail (animated)
    ctx.fillStyle = '#a85a3a';
    ctx.beginPath();
    ctx.moveTo(-20, bob);
    ctx.quadraticCurveTo(-32, -2 + bob + tailSway*0.4, -40, 4 + bob + tailSway);
    ctx.quadraticCurveTo(-32, 10 + bob + tailSway*0.4, -20, 8 + bob);
    ctx.fill();

    // tiny T-Rex arms — folded against body, with little claws
    ctx.fillStyle = '#7a3a20';
    ctx.fillRect(13, -1+bob, 6, 3);
    ctx.fillStyle = '#fff5cc';
    ctx.fillRect(19, -1+bob, 2, 1.2);
    ctx.fillRect(19, 1+bob,  2, 1.2);

    // BIG head
    ctx.fillStyle = '#a85a3a';
    ctx.beginPath(); ctx.ellipse(22, -3+bob+headBob, 13, 10, 0, 0, Math.PI*2); ctx.fill();
    // upper jaw extending forward
    ctx.beginPath();
    ctx.moveTo(28, -4+bob+headBob);
    ctx.lineTo(38, -2+bob+headBob);
    ctx.lineTo(38, 2+bob+headBob);
    ctx.lineTo(28, 2+bob+headBob);
    ctx.closePath(); ctx.fill();
    // lower jaw (slightly open to show teeth)
    ctx.fillStyle = '#7a3a20';
    ctx.beginPath();
    ctx.moveTo(20, 4+bob+headBob);
    ctx.lineTo(37, 6+bob+headBob);
    ctx.lineTo(20, 7+bob+headBob);
    ctx.closePath(); ctx.fill();

    // teeth (jagged, top + bottom)
    ctx.fillStyle = '#fff5cc';
    for (let i=0;i<4;i++) {
      const x = 24 + i*3.5;
      ctx.beginPath();
      ctx.moveTo(x-1.2, 1+bob+headBob);
      ctx.lineTo(x,     5+bob+headBob);
      ctx.lineTo(x+1.2, 1+bob+headBob);
      ctx.closePath(); ctx.fill();
    }
    for (let i=0;i<3;i++) {
      const x = 25 + i*3.5;
      ctx.beginPath();
      ctx.moveTo(x-1.0, 5+bob+headBob);
      ctx.lineTo(x,     1.5+bob+headBob);
      ctx.lineTo(x+1.0, 5+bob+headBob);
      ctx.closePath(); ctx.fill();
    }

    // angry eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(22, -7+bob+headBob, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(23, -7+bob+headBob, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(22.4, -7.8+bob+headBob, 0.8, 0, Math.PI*2); ctx.fill();
    // eyebrow
    ctx.strokeStyle = '#3a1a08'; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(18, -11+bob+headBob);
    ctx.lineTo(27, -8+bob+headBob);
    ctx.stroke();
    ctx.lineCap = 'butt';

    if (p.attackAnim > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.arc(38, 2+bob+headBob, 7*p.attackAnim*4, 0, Math.PI*2); ctx.fill();
    }

    ctx.filter = 'none';
    ctx.restore();
  }

  // ----- Diplodok -----
  function drawDiplo(p) {
    ctx.save();
    ctx.translate(p.x, p.y - (p.jump>0 ? Math.sin((0.5-p.jump)*Math.PI)*22 : 0));
    if (p.facing === -1) ctx.scale(-1, 1);
    if (p.flash > 0) ctx.filter = 'brightness(1.6) saturate(0.5)';

    const wp = p.walkPhase || 0;
    const moving = Math.hypot(p.vx, p.vy) > 30;
    const bob = Math.sin(wp*2) * (moving ? 1.4 : 0.3);
    const tailSway = Math.sin(wp) * (moving ? 6 : 1);
    const neckSway = Math.sin(wp + 0.7) * (moving ? 1.8 : 0.4);
    const liftBack  = Math.max(0, Math.sin(wp));
    const liftFront = Math.max(0, Math.sin(wp + Math.PI));
    const liftAmt = moving ? 4 : 0;

    // long shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(-2, 18, 30, 6, 0, 0, Math.PI*2); ctx.fill();

    // 4 sturdy legs (back pair + front pair, each with a far/near)
    ctx.fillStyle = '#1f5a5a';
    ctx.fillRect(-12, 11 + bob*0.3 - liftBack*liftAmt, 4, 12 - liftBack*3);
    ctx.fillStyle = '#2c6f6f';
    ctx.fillRect(-15, 10 + bob*0.4 - liftBack*liftAmt, 6, 13 - liftBack*4);
    ctx.fillStyle = '#1f5a5a';
    ctx.fillRect( 8, 11 + bob*0.3 - liftFront*liftAmt, 4, 12 - liftFront*3);
    ctx.fillStyle = '#2c6f6f';
    ctx.fillRect( 5, 10 + bob*0.4 - liftFront*liftAmt, 6, 13 - liftFront*4);

    // body — long, low, oval
    ctx.fillStyle = '#3a8a8a';
    ctx.beginPath(); ctx.ellipse(-3, bob+1, 22, 11, 0, 0, Math.PI*2); ctx.fill();
    // belly
    ctx.fillStyle = '#7accbe';
    ctx.beginPath(); ctx.ellipse(-3, 6+bob, 16, 4, 0, 0, Math.PI*2); ctx.fill();

    // very long whip-like tail
    ctx.fillStyle = '#3a8a8a';
    ctx.beginPath();
    ctx.moveTo(-22, bob);
    ctx.quadraticCurveTo(-32, -1 + bob + tailSway*0.3, -42, 3 + bob + tailSway*0.7);
    ctx.quadraticCurveTo(-50, 5 + bob + tailSway,    -52, 7 + bob + tailSway*1.1);
    ctx.quadraticCurveTo(-46, 7 + bob + tailSway*0.8, -36, 6 + bob + tailSway*0.4);
    ctx.quadraticCurveTo(-30, 6 + bob + tailSway*0.2, -22, 5 + bob);
    ctx.fill();

    // long curving neck
    ctx.fillStyle = '#3a8a8a';
    ctx.beginPath();
    ctx.moveTo(15, bob - 2);
    ctx.quadraticCurveTo(22, -10 + bob + neckSway*0.5, 28, -18 + bob + neckSway);
    ctx.quadraticCurveTo(33, -22 + bob + neckSway*1.2, 36, -22 + bob + neckSway);
    ctx.quadraticCurveTo(34, -16 + bob + neckSway*0.9, 26, -14 + bob + neckSway*0.7);
    ctx.quadraticCurveTo(20, -6 + bob + neckSway*0.4, 15, bob + 2);
    ctx.fill();

    // small head atop the neck
    ctx.fillStyle = '#3a8a8a';
    ctx.beginPath(); ctx.ellipse(36, -22 + bob + neckSway, 7, 5, 0, 0, Math.PI*2); ctx.fill();
    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(38, -23 + bob + neckSway, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(38.6, -23 + bob + neckSway, 1.0, 0, Math.PI*2); ctx.fill();
    // mouth — friendly little line
    ctx.strokeStyle = '#1f5050'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(36, -19+bob+neckSway); ctx.lineTo(42, -19+bob+neckSway); ctx.stroke();

    // small dots along the back (subtle texture, no plates)
    ctx.fillStyle = '#1f5a5a';
    for (let i=-2; i<=2; i++) {
      ctx.beginPath();
      ctx.arc(-3 + i*5, -8+bob, 1.2, 0, Math.PI*2);
      ctx.fill();
    }

    // attack flash near mouth (head is far from body for diplo)
    if (p.attackAnim > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.arc(42, -21 + bob + neckSway, 7*p.attackAnim*4, 0, Math.PI*2); ctx.fill();
    }

    ctx.filter = 'none';
    ctx.restore();
  }

  function drawAlien(a) {
    ctx.save();
    ctx.translate(a.x, a.y);
    const bob = Math.sin(state.t*4 + a.wob) * 2.2;

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0, a.r*0.7, a.r*0.85, a.r*0.25, 0, 0, Math.PI*2); ctx.fill();

    // Pick the source sprite per alien type:
    //   small  -> animated cute round-robot (FLYER_ANIM)
    //   walker -> static wide rocket (char-walker.png)
    //   big    -> animated green-warrior (BIGALIEN_ANIM) with static fallback
    const walkerReady   = a.type === 'walker' && charSprites.walker.complete   && charSprites.walker.naturalWidth;
    const bigalienReady = a.type === 'big'    && charSprites.bigalien.complete && charSprites.bigalien.naturalWidth;
    const alienImg = a.type === 'small' ? charSprites.flyer
                   : walkerReady        ? charSprites.walker
                   : bigalienReady      ? charSprites.bigalien
                                        : charSprites.alien;
    if (alienImg && alienImg.complete && alienImg.naturalWidth) {
      ctx.restore();
      const scale = a.type === 'big' ? 1.18 : (a.type === 'small' ? 1.0 : 0.86);
      // Walker is a wide rocket (~2:1), the others are tall.
      let w, h;
      if (a.type === 'small') {
        w = a.r * 2.6 * scale;  h = a.r * 3.6 * scale;
      } else if (walkerReady) {
        w = a.r * 4.2 * scale;
        h = w * WALKER_ANIM.frameH / WALKER_ANIM.frameW;
      } else {
        w = a.r * 2.45 * scale; h = a.r * 3.75 * scale;
      }
      ctx.save();
      ctx.translate(a.x, a.y - a.r*0.52 + bob*0.35);
      if (a.vx < -5) ctx.scale(-1, 1);
      if (a.type === 'small') {
        const frame = Math.floor(state.t * FLYER_ANIM.fps + (a.wob || 0)) % FLYER_ANIM.frames;
        ctx.drawImage(alienImg,
          frame * FLYER_ANIM.frameW, 0, FLYER_ANIM.frameW, FLYER_ANIM.frameH,
          -w/2, -h/2, w, h);
      } else if (walkerReady) {
        const frame = Math.floor(state.t * WALKER_ANIM.fps + (a.wob || 0)) % WALKER_ANIM.frames;
        ctx.drawImage(alienImg,
          frame * WALKER_ANIM.frameW, 0, WALKER_ANIM.frameW, WALKER_ANIM.frameH,
          -w/2, -h/2, w, h);
      } else if (bigalienReady) {
        const frame = Math.floor(state.t * BIGALIEN_ANIM.fps + (a.wob || 0)) % BIGALIEN_ANIM.frames;
        ctx.drawImage(alienImg,
          frame * BIGALIEN_ANIM.frameW, 0, BIGALIEN_ANIM.frameW, BIGALIEN_ANIM.frameH,
          -w/2, -h/2, w, h);
      } else {
        ctx.drawImage(alienImg, -w/2, -h/2, w, h);
      }
      ctx.restore();
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(a.x - a.r, a.y - a.r-12, a.r*2, 4);
      ctx.fillStyle = '#ff7a7a';
      ctx.fillRect(a.x - a.r, a.y - a.r-12, a.r*2 * (a.hp/a.maxHp), 4);
      ctx.restore();
      return;
    }

    const robotScale = a.type === 'big' ? 1.35 : (a.type === 'small' ? 0.82 : 1.0);
    ctx.restore();
    if (drawSprite('robot', a.x, a.y - a.r*0.18 + bob*0.35, a.r*2.35*robotScale, a.r*2.55*robotScale, {flip: a.vx < -5})) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(a.x - a.r, a.y - a.r-12, a.r*2, 4);
      ctx.fillStyle = '#ff7a7a';
      ctx.fillRect(a.x - a.r, a.y - a.r-12, a.r*2 * (a.hp/a.maxHp), 4);
      ctx.restore();
      return;
    }
    ctx.save();
    ctx.translate(a.x, a.y);

    if (a.type === 'big') {
      // BIG alien — friendly mushroom-blob style with 1 big eye, antennae, little legs.
      // legs
      ctx.fillStyle = '#5b3a8a';
      for (let i=-1;i<=1;i++){
        ctx.fillRect(-3 + i*9, a.r*0.4, 5, 10);
      }
      // body (round purple)
      ctx.fillStyle = '#9d6dff';
      ctx.beginPath(); ctx.arc(0, bob, a.r, 0, Math.PI*2); ctx.fill();
      // belly
      ctx.fillStyle = '#caa6ff';
      ctx.beginPath(); ctx.ellipse(0, bob+8, a.r*0.7, a.r*0.4, 0, 0, Math.PI*2); ctx.fill();
      // spots
      ctx.fillStyle = '#7a4cd6';
      ctx.beginPath(); ctx.arc(-10, bob-6, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(8, bob+2, 3, 0, Math.PI*2); ctx.fill();
      // antennae
      ctx.strokeStyle = '#5b3a8a'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-8, bob - a.r + 2); ctx.quadraticCurveTo(-14, bob - a.r - 12, -16, bob - a.r - 16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8, bob - a.r + 2); ctx.quadraticCurveTo(14, bob - a.r - 12, 16, bob - a.r - 16); ctx.stroke();
      ctx.fillStyle = '#ffd166';
      ctx.beginPath(); ctx.arc(-16, bob - a.r - 16, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(16, bob - a.r - 16, 3, 0, Math.PI*2); ctx.fill();
      // big eye
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, bob - 4, 9, 0, Math.PI*2); ctx.fill();
      // bloodshot tinge so the eye reads "menacing", not "cartoon-cute"
      ctx.fillStyle = '#ffd2c4';
      ctx.beginPath(); ctx.arc(0, bob - 4, 9, 0, Math.PI*2); ctx.globalAlpha = 0.3; ctx.fill(); ctx.globalAlpha = 1;
      ctx.fillStyle = '#1a1a2a';
      const lookX = clamp((state.player.x - a.x)/30, -3, 3);
      const lookY = clamp((state.player.y - a.y)/30, -3, 3);
      ctx.beginPath(); ctx.arc(lookX, bob - 4 + lookY, 4.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(lookX-1.5, bob - 5.5 + lookY, 1.4, 0, Math.PI*2); ctx.fill();

      // angry V-shaped eyebrow above the eye (slants down toward center)
      ctx.strokeStyle = '#3a1f6a'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-9, bob - 14);   // outer end higher
      ctx.lineTo(-1, bob - 11);
      ctx.lineTo( 9, bob - 14);   // outer end higher (mirror) — V shape pointing down to eye
      ctx.stroke();
      ctx.lineCap = 'butt';

      // mouth — open & toothy when within striking distance, grumpy frown otherwise
      const distP = Math.hypot(state.player.x - a.x, state.player.y - a.y);
      if (distP < 95) {
        // open angry mouth
        ctx.fillStyle = '#1a0a2a';
        ctx.beginPath();
        ctx.ellipse(0, bob + 8, 8, 5, 0, 0, Math.PI*2);
        ctx.fill();
        // jagged teeth — small white triangles top & bottom
        ctx.fillStyle = '#fff5e0';
        for (let i=-1; i<=1; i++) {
          const x = i*4;
          // upper teeth
          ctx.beginPath();
          ctx.moveTo(x - 1.7, bob + 5.2);
          ctx.lineTo(x,       bob + 9);
          ctx.lineTo(x + 1.7, bob + 5.2);
          ctx.closePath(); ctx.fill();
        }
        for (let i=-1; i<=1; i++) {
          const x = i*4 + 2;
          // lower teeth (offset)
          ctx.beginPath();
          ctx.moveTo(x - 1.4, bob + 11);
          ctx.lineTo(x,       bob + 7.5);
          ctx.lineTo(x + 1.4, bob + 11);
          ctx.closePath(); ctx.fill();
        }
      } else {
        // closed grumpy frown — middle dips upward
        ctx.strokeStyle = '#3a1f6a'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-7, bob + 9);
        ctx.quadraticCurveTo(0, bob + 4, 7, bob + 9);
        ctx.stroke();
        ctx.lineCap = 'butt';
      }
    } else if (a.type === 'walker') {
      // SMALL WALKING alien — orange-red, 4 thin legs, two big eyes, a little gremlin
      // step animation
      const step = Math.sin(state.t*8 + a.wob) * 3;
      // legs
      ctx.strokeStyle = '#7a2317'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-a.r*0.5, a.r*0.3); ctx.lineTo(-a.r*0.7, a.r*0.9 + step);
      ctx.moveTo(-a.r*0.2, a.r*0.4); ctx.lineTo(-a.r*0.3, a.r*0.95 - step);
      ctx.moveTo( a.r*0.2, a.r*0.4); ctx.lineTo( a.r*0.3, a.r*0.95 + step);
      ctx.moveTo( a.r*0.5, a.r*0.3); ctx.lineTo( a.r*0.7, a.r*0.9 - step);
      ctx.stroke();
      // body
      ctx.fillStyle = '#e85a3c';
      ctx.beginPath(); ctx.arc(0, bob, a.r, 0, Math.PI*2); ctx.fill();
      // belly
      ctx.fillStyle = '#ffb59a';
      ctx.beginPath(); ctx.ellipse(0, bob+5, a.r*0.65, a.r*0.35, 0, 0, Math.PI*2); ctx.fill();
      // back spikes
      ctx.fillStyle = '#a73320';
      for (let i=-1;i<=1;i++) {
        ctx.beginPath();
        ctx.moveTo(i*7 - 3, bob - a.r*0.85);
        ctx.lineTo(i*7,     bob - a.r*1.25);
        ctx.lineTo(i*7 + 3, bob - a.r*0.85);
        ctx.closePath(); ctx.fill();
      }
      // two eyes
      const eyeLook = clamp((state.player.x - a.x)/40, -1.5, 1.5);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-5, bob-3, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5,  bob-3, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(-5+eyeLook, bob-3, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5+eyeLook,  bob-3, 2, 0, Math.PI*2); ctx.fill();
      // little teeth/mouth (cartoon-fierce, not scary)
      ctx.strokeStyle = '#5a1a10'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(-4, bob+5); ctx.lineTo(-2, bob+7); ctx.lineTo(0, bob+5); ctx.lineTo(2, bob+7); ctx.lineTo(4, bob+5); ctx.stroke();
    } else {
      // SMALL flyer — brown UFO-like with 3 small eyes
      // wing/saucer
      ctx.fillStyle = '#7a5a3a';
      ctx.beginPath(); ctx.ellipse(0, bob+2, a.r, a.r*0.45, 0, 0, Math.PI*2); ctx.fill();
      // dome
      ctx.fillStyle = '#b08660';
      ctx.beginPath(); ctx.arc(0, bob - 2, a.r*0.7, Math.PI, 0); ctx.fill();
      // dome window
      ctx.fillStyle = '#2dd2c6';
      ctx.beginPath(); ctx.arc(0, bob - 3, a.r*0.55, Math.PI*1.05, -0.05*Math.PI); ctx.fill();
      // 3 eyes
      ctx.fillStyle = '#1a1a2a';
      for (let i=-1;i<=1;i++) { ctx.beginPath(); ctx.arc(i*5, bob-4, 1.6, 0, Math.PI*2); ctx.fill(); }
      // lights under
      const lit = Math.floor(state.t*4 + a.wob*2) % 3;
      for (let i=0;i<3;i++) {
        ctx.fillStyle = i===lit ? '#ffd166' : '#553';
        ctx.beginPath(); ctx.arc(-a.r*0.6 + i*a.r*0.6, bob+5, 2.3, 0, Math.PI*2); ctx.fill();
      }
    }

    // hp bar
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-a.r, -a.r-12, a.r*2, 4);
    ctx.fillStyle = '#ff7a7a';
    ctx.fillRect(-a.r, -a.r-12, a.r*2 * (a.hp/a.maxHp), 4);

    ctx.restore();
  }

  function drawProjectile(pr) {
    ctx.save();
    ctx.translate(pr.x, pr.y);
    if (pr.kind === 'fire') {
      const lifeFrac = clamp(pr.life / 0.55, 0, 1);
      ctx.globalAlpha = lifeFrac;
      ctx.fillStyle = '#ff8533';
      ctx.beginPath(); ctx.arc(0,0, pr.r * (0.6+0.4*lifeFrac), 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffe066';
      ctx.beginPath(); ctx.arc(0,0, pr.r*0.55*lifeFrac, 0, Math.PI*2); ctx.fill();
    } else if (pr.kind === 'plasma') {
      // Arrow shot from the alien base — rotated to match velocity
      const ang = Math.atan2(pr.vy, pr.vx);
      ctx.rotate(ang);
      // wooden shaft
      ctx.fillStyle = '#7a4a20';
      ctx.fillRect(-13, -1.2, 22, 2.4);
      // shaft highlight (top)
      ctx.fillStyle = '#a07040';
      ctx.fillRect(-13, -1.2, 22, 0.8);
      // metal arrowhead — pointed triangle at the leading edge
      ctx.fillStyle = '#cdd0d4';
      ctx.beginPath();
      ctx.moveTo(9, -4.5);
      ctx.lineTo(15, 0);
      ctx.lineTo(9, 4.5);
      ctx.closePath();
      ctx.fill();
      // arrowhead shading
      ctx.fillStyle = '#7a8088';
      ctx.beginPath();
      ctx.moveTo(9, 0);
      ctx.lineTo(15, 0);
      ctx.lineTo(9, 4.5);
      ctx.closePath();
      ctx.fill();
      // red feather fletching at the back
      ctx.fillStyle = '#cc3333';
      ctx.beginPath();
      ctx.moveTo(-13, -3.5);
      ctx.lineTo(-7, -1);
      ctx.lineTo(-7,  1);
      ctx.lineTo(-13, 3.5);
      ctx.lineTo(-16, 0);
      ctx.closePath();
      ctx.fill();
      // fletching detail line
      ctx.strokeStyle = '#7a1a1a'; ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(-13, -3.5); ctx.lineTo(-13, 3.5);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawFx(f) {
    ctx.save();
    if (f.kind === 'ring') {
      const k = clamp(f.t / (f.t + f.life), 0, 1);
      const r = f.r0 + (f.r1 - f.r0) * k;
      ctx.globalAlpha = 1 - k;
      ctx.strokeStyle = f.color || '#fff';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI*2); ctx.stroke();
    } else if (f.kind === 'puff') {
      ctx.globalAlpha = clamp(f.life, 0, 1);
      ctx.fillStyle = f.color || '#9b7';
      ctx.beginPath(); ctx.arc(f.x, f.y, 3, 0, Math.PI*2); ctx.fill();
    } else if (f.kind === 'egg') {
      ctx.fillStyle = '#fff5cc';
      ctx.strokeStyle = '#a07';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.ellipse(f.x, f.y, 6, 8, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    } else if (f.kind === 'notify') {
      ctx.globalAlpha = clamp(f.life / 1.2, 0, 1);
      ctx.font = 'bold 18px system-ui';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const w = ctx.measureText(f.text).width + 28;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      roundRect(f.x - w/2, f.y - 16, w, 32, 8); ctx.fill();
      ctx.fillStyle = f.color || '#fff';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.restore();
  }

  function roundRect(x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  // ---------- Boot ----------
  buildLevel();
  requestAnimationFrame(now => { last = now; frame(now); });
})();
</script>
</body>
</html>
