<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grażkowe Grafiki — portrety, zaproszenia, ilustracje</title>
  <meta name="description" content="Komiksowe i akwarelowe portrety na zamówienie, zaproszenia ślubne, kartki okolicznościowe i ilustracje. Joanna Chromiec.">
  <meta property="og:title" content="Grażkowe Grafiki — portrety, zaproszenia">
  <meta property="og:image" content="../assets/portret-rodzinny-mama-dzieci-ramka_rwc_787.png">
  <link rel="icon" href="../assets/portret-dziecko-miniatura_carw_32.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="css/modern.css">
</head>
<body>
  <a class="skip-link" href="#prace">Pomiń do prac</a>

  <header class="topnav" id="topnav">
    <div class="topnav__inner container">
      <a href="#top" class="topnav__logo">Grażkowe Grafiki</a>
      <nav class="topnav__links" id="topnav-links" aria-label="Główna nawigacja">
        <a href="#prace" data-section="prace">Prace</a>
        <a href="#o-mnie" data-section="o-mnie">O mnie</a>
        <a href="#opinie" data-section="opinie">Opinie</a>
        <a href="#kontakt" data-section="kontakt">Kontakt</a>
      </nav>
      <button class="topnav__hamburger" id="hamburger" aria-label="Menu" aria-expanded="false" aria-controls="topnav-links">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main>
    <section id="top" class="hero">
      <div class="hero__inner container">
        <div class="hero__content">
          <h1 class="hero__title">Hej,<br>miło Cię&nbsp;widzieć!</h1>
          <p class="hero__lead">
            Rysuję portrety, zaproszenia i kartki na zamówienie.
            Komiksowe, akwarelowe, kreskówkowe — robimy razem coś osobistego.
          </p>
          <a href="#prace" class="btn btn--primary">Zobacz prace →</a>
        </div>
        <div class="hero__media">
          <img src="../assets/portret-rodzinny-mama-dzieci-ramka_rwc_787.png"
               alt="Komiksowy portret rodzinny — przykładowa praca"
               width="600" height="600">
        </div>
      </div>
      <a href="#prace" class="hero__scroll" aria-label="Przewiń do prac">↓</a>
    </section>
    <section id="prace" class="prace">
      <div class="container">
        <h2 class="section-title">Prace</h2>
        <div class="grid" id="grid" aria-busy="true">
          <p class="grid__loading">Ładowanie prac…</p>
        </div>
      </div>
    </section>
    <section id="o-mnie" class="about"></section>
    <section id="opinie" class="opinions"></section>
    <section id="kontakt" class="contact"></section>
  </main>

  <footer class="footer" id="footer" hidden></footer>

  <div class="lightbox" id="lightbox" hidden></div>

  <script src="js/modern.js"></script>
